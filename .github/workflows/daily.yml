name: Daily Contribution

permissions:
  contents: write

on:
  schedule:
    # Runs once every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  contribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "NABORAJ SARKAR"
          git config user.email "nishant.ns.business@gmail.com"

      - name: Update contribution file
        run: |
          mkdir -p logs

          DATE=$(date -u +"%Y-%m-%d")
          TIME=$(date -u +"%H:%M:%S")

          echo "Contribution on $DATE at $TIME UTC - $RANDOM" > logs/today.txt
          echo "$DATE $TIME UTC - $RANDOM" >> logs/history.txt

      - name: Commit changes
        run: |
          git add .
          git diff --staged --quiet || git commit -m "chore: daily contribution"

      - name: Push changes
        run: |
          git push
