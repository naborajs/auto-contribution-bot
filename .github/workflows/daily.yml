name: Daily Contribution

permissions:
contents: write

on:
schedule:
- cron: '0 6 * * *'
- cron: '0 12 * * *'
- cron: '0 18 * * *'

workflow_dispatch:

jobs:
contribute:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Configure Git
    run: |
      git config user.name "NABORAJ SARKAR"
      git config user.email "nishant.ns.business@gmail.com"

  - name: Create daily file
    run: |
      export TZ=Asia/Kolkata

      mkdir -p logs

      DATE=$(date +%F)
      TIME=$(date +"%H:%M:%S")

      echo "Contribution: $DATE $TIME" > logs/$DATE.txt

  - name: Commit changes
    run: |
      git add logs/

      git commit -m "chore: daily contribution $(date +%F)" || echo "No changes to commit"

  - name: Pull latest changes
    run: |
      git pull origin main --rebase || true

  - name: Push changes
    run: |
      git push origin main
```
