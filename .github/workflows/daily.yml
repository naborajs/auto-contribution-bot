name: Daily Contribution

permissions:
contents: write

on:
schedule:
# Runs every 6 hours so GitHub has multiple chances
- cron: '0 */6 * * *'

workflow_dispatch:

jobs:
contribute:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Random delay (0-6 hours)
    run: sleep $((RANDOM % 21600))

  - name: Configure Git
    run: |
      git config --global user.name "NABORAJ SARKAR"
      git config --global user.email "nishant.ns.business@gmail.com"

  - name: Create contribution
    run: |
      export TZ=Asia/Kolkata

      mkdir -p logs

      DATE=$(date +%F)
      TIME=$(date +"%H:%M:%S")

      echo "$DATE $TIME $RANDOM" > logs/today.txt

  - name: Commit
    run: |
      git add .
      git commit -m "chore: daily contribution $(date +%F)" || exit 0

  - name: Push
    run: |
      git push
```
